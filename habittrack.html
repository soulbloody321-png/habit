<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>habittrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --text:#f0ede8;--text2:#a09d98;--text3:#5a5855;
  --green:#3dba8a;--red:#e05c4a;--amber:#d4920f;--blue:#4a90d9;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --radius:12px;--radius-sm:8px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;max-width:520px;margin:0 auto;min-height:100dvh;}

.pin-screen{position:fixed;inset:0;background:var(--bg);z-index:998;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 20px;}
.pin-logo{font-family:var(--mono);font-size:24px;color:var(--text2);}
.pin-logo span{color:var(--green);}
.pin-sub{font-family:var(--mono);font-size:12px;color:var(--text3);}
.pin-input{background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);padding:14px 20px;font-size:28px;font-family:var(--mono);letter-spacing:8px;text-align:center;width:190px;outline:none;-webkit-text-security:disc;}
.pin-input:focus{border-color:var(--green);}
.pin-btn{background:var(--green);color:#0f0f0f;border:none;border-radius:var(--radius-sm);padding:12px 32px;font-size:15px;font-weight:600;cursor:pointer;}
.pin-err{font-family:var(--mono);font-size:12px;color:var(--red);min-height:16px;}

.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:997;transition:opacity 0.3s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-family:var(--mono);font-size:22px;color:var(--text2);}
.loading-logo span{color:var(--green);}
.loading-dots{display:flex;gap:6px;}
.loading-dots div{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite;}
.loading-dots div:nth-child(2){animation-delay:0.2s;}
.loading-dots div:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:0.4}40%{transform:scale(1);opacity:1}}

.header{display:flex;align-items:center;justify-content:space-between;padding:calc(14px + var(--safe-top)) 20px 12px;background:var(--bg);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);}
.logo{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);letter-spacing:-0.5px;}
.logo span{color:var(--green);}
.header-right{display:flex;align-items:center;gap:10px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background 0.3s;flex-shrink:0;}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.date-label{font-family:var(--mono);font-size:12px;color:var(--text2);}

.date-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 4px;}
.nav-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.nav-btn:hover{background:var(--bg4);color:var(--text);}
.day-display{text-align:center;}
.day-name{font-size:13px;font-weight:600;color:var(--text);text-transform:capitalize;}
.day-date{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:1px;}

.week-strip{display:flex;gap:4px;padding:8px 20px 12px;overflow-x:auto;scrollbar-width:none;}
.week-strip::-webkit-scrollbar{display:none;}
.week-day{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;width:40px;padding:6px 4px;border-radius:var(--radius-sm);transition:background 0.15s;}
.week-day:hover{background:var(--bg3);}
.week-day.active{background:var(--bg3);border:1px solid var(--border2);}
.wd-name{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;}
.wd-num{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text2);}
.week-day.active .wd-num{color:var(--green);}
.wd-dot{width:5px;height:5px;border-radius:50%;}

.progress-section{padding:0 20px 8px;}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.progress-label{font-size:12px;color:var(--text2);}
.progress-count{font-family:var(--mono);font-size:12px;color:var(--text3);}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.progress-bar-fill{height:4px;background:var(--green);border-radius:4px;transition:width 0.4s ease;}

.habits-list{padding:4px 20px 100px;display:flex;flex-direction:column;gap:6px;}
.habit-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;cursor:pointer;transition:all 0.15s;user-select:none;}
.habit-item:active{transform:scale(0.98);}
.habit-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:14px;}
.habit-item.done .habit-check{border-color:transparent;}
.habit-info{flex:1;min-width:0;}
.habit-name{font-size:14px;font-weight:500;color:var(--text);transition:color 0.15s;}
.habit-item.done .habit-name{color:var(--text2);}
.habit-streak{font-family:var(--mono);font-size:11px;color:var(--text3);}
.habit-streak.hot{color:var(--amber);}
.habit-icon-emoji{font-size:20px;flex-shrink:0;}
.empty-habits{text-align:center;padding:48px 0;color:var(--text3);font-size:14px;font-family:var(--mono);}

.tabs{display:flex;padding:12px 20px 0;gap:4px;border-bottom:1px solid var(--border);}
.tab{flex:1;text-align:center;padding:8px 4px 10px;font-size:12px;font-family:var(--mono);letter-spacing:0.02em;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}

.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px;}
.cal-month-label{font-family:var(--mono);font-size:14px;color:var(--text);}
.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);padding:0 20px;gap:2px;margin-bottom:4px;}
.cal-dow{text-align:center;font-family:var(--mono);font-size:10px;color:var(--text3);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 20px;gap:4px;}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:background 0.15s;padding:2px;}
.cal-cell:hover{background:var(--bg3);}
.cal-cell.other-month{opacity:0.2;pointer-events:none;}

.stats-content{padding:12px 20px 100px;display:flex;flex-direction:column;gap:10px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.stat-card-title{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.stat-num{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text);}
.stat-num-label{font-size:11px;color:var(--text3);margin-top:2px;}
.activity-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;}
.act-cell{aspect-ratio:1;border-radius:3px;background:var(--bg3);}

.settings-content{padding:12px 20px 100px;display:flex;flex-direction:column;gap:10px;}
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.settings-title{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px;}
.settings-info{font-size:13px;color:var(--text2);line-height:1.6;}
.settings-btn{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);padding:9px 14px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all 0.15s;width:100%;margin-top:8px;}
.settings-btn:hover{color:var(--text);background:var(--bg4);}
.settings-btn.danger{border-color:rgba(224,92,74,0.3);color:var(--red);}
.settings-btn.danger:hover{background:rgba(224,92,74,0.1);}
.hmr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.hmr:last-child{border-bottom:none;}
.hmr-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 6px;margin-left:auto;transition:color 0.15s;}
.hmr-del:hover{color:var(--red);}
.status-msg{font-size:12px;font-family:var(--mono);margin-top:6px;}
.status-ok{color:var(--green);}
.status-err{color:var(--red);}

.fab{position:fixed;bottom:calc(60px + var(--safe-bottom));right:50%;transform:translateX(50%);background:var(--green);color:#0f0f0f;border:none;border-radius:50%;width:56px;height:56px;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100;transition:transform 0.2s;box-shadow:0 4px 20px rgba(61,186,138,0.35);}
.fab:hover{transform:translateX(50%) scale(1.06);}
.fab.open{transform:translateX(50%) rotate(45deg);}
.fab-hidden{display:none!important;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:60;padding-bottom:var(--safe-bottom);}
.bnav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bnav-icon{font-size:18px;}
.bnav-label{font-family:var(--mono);font-size:10px;color:var(--text3);}
.bnav-btn.active .bnav-label{color:var(--green);}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-bg.visible{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 20px calc(20px + var(--safe-bottom));border-top:1px solid var(--border2);transform:translateY(20px);transition:transform 0.25s ease;}
.modal-bg.visible .modal{transform:translateY(0);}
.modal-handle{width:36px;height:3px;background:var(--bg4);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;}
.field-label{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin:10px 0 5px;}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:10px 12px;font-size:15px;font-family:var(--font);outline:none;transition:border-color 0.15s;}
.field-input:focus{border-color:var(--green);}
.field-input::placeholder{color:var(--text3);}
.icon-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.icon-btn{width:38px;height:38px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.icon-btn.sel{border-color:var(--green);background:rgba(61,186,138,0.15);}
.color-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform 0.15s;border:2px solid transparent;}
.color-dot.sel{transform:scale(1.2);border-color:white;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.btn-cancel{flex:1;padding:11px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:none;cursor:pointer;color:var(--text2);font-size:14px;font-family:var(--font);}
.btn-save{flex:2;padding:11px;border:none;border-radius:var(--radius-sm);background:var(--green);color:#0f0f0f;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font);}
.modal-status{font-size:12px;font-family:var(--mono);text-align:center;padding:4px 0;min-height:18px;}

@media(min-width:520px){
  .fab{right:calc(50% - 260px + 24px);transform:none;}
  .fab:hover{transform:scale(1.06);}
  .fab.open{transform:rotate(45deg);}
}
@media(prefers-color-scheme:light){
  :root{--bg:#f7f5f2;--bg2:#ffffff;--bg3:#f0ede8;--bg4:#e5e2dd;--text:#1a1814;--text2:#6b6760;--text3:#a09d98;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);}
}
</style>
</head>
<body>

<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">habit<span>track</span></div>
  <div class="pin-sub">introduce tu PIN</div>
  <input type="password" inputmode="numeric" pattern="[0-9]*" class="pin-input" id="pinInput" maxlength="6" placeholder="······" autocomplete="off">
  <button class="pin-btn" onclick="checkPin()">entrar</button>
  <div class="pin-err" id="pinErr"></div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">habit<span>track</span></div>
  <div class="loading-dots"><div></div><div></div><div></div></div>
</div>

<div class="header">
  <div class="logo">habit<span>track</span></div>
  <div class="header-right">
    <div class="sync-dot" id="syncDot"></div>
    <div class="date-label" id="headerDate"></div>
  </div>
</div>

<div id="todayView">
  <div class="date-nav">
    <button class="nav-btn" id="prevDay">&#8249;</button>
    <div class="day-display">
      <div class="day-name" id="dayName"></div>
      <div class="day-date" id="dayDate"></div>
    </div>
    <button class="nav-btn" id="nextDay">&#8250;</button>
  </div>
  <div class="week-strip" id="weekStrip"></div>
  <div class="progress-section">
    <div class="progress-top">
      <span class="progress-label" id="progressLabel">0 de 0 completados</span>
      <span class="progress-count" id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  </div>
  <div class="habits-list" id="habitsList"></div>
</div>

<div id="tabsView" style="display:none;flex-direction:column;flex:1;">
  <div class="tabs">
    <div class="tab active" data-tab="calendar">calendario</div>
    <div class="tab" data-tab="stats">estadísticas</div>
    <div class="tab" data-tab="settings">ajustes</div>
  </div>
  <div id="tabContent" style="flex:1;overflow-y:auto;"></div>
</div>

<div class="bottom-nav">
  <button class="bnav-btn active" id="bnToday" onclick="switchView('today')">
    <span class="bnav-icon">&#9728;&#65039;</span>
    <span class="bnav-label">hoy</span>
  </button>
  <button class="bnav-btn" id="bnMore" onclick="switchView('tabs')">
    <span class="bnav-icon">&#128202;</span>
    <span class="bnav-label">más</span>
  </button>
</div>

<button class="fab" id="fabBtn">+</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo hábito</div>
    <div class="field-label">nombre</div>
    <input type="text" class="field-input" id="habitName" placeholder="ej: Meditar, Ejercicio...">
    <div class="field-label">icono</div>
    <div class="icon-grid" id="iconGrid"></div>
    <div class="field-label">color</div>
    <div class="color-grid" id="colorGrid"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">cancelar</button>
      <button class="btn-save" onclick="saveHabit()">guardar</button>
    </div>
    <div class="modal-status" id="modalStatus"></div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://bpwwjfibxjvrkodhvthe.supabase.co';
var SUPABASE_KEY = 'sb_publishable_DUno6axx3HkSElLGRQnKhQ_oGnVddHb';
var PIN = '070600';

var ICONS  = ['⭐','💪','🧘','🏃','📚','💧','🥗','😴','✍️','🎯','🎨','🎸','🧹','💊','🚴','🧠','🌿','☀️','🐾','💻'];
var COLORS = ['#3dba8a','#4a90d9','#e05c4a','#d4920f','#d45c8a','#8b7ed8','#6aab3a','#888580','#e09a3a','#4abbd4'];
var MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var DAYS   = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
var DSHORT = ['D','L','M','X','J','V','S'];

var habits   = [];
var logs     = {};
var viewDate = new Date();
var calYear  = new Date().getFullYear();
var calMonth = new Date().getMonth();
var selIcon  = ICONS[0];
var selColor = COLORS[0];
var activeTab = 'calendar';
var mainView  = 'today';

var SB_HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Prefer': 'return=representation'
};

function sbGet(table, query) {
  return fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + (query||''), { headers: SB_HEADERS })
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); });
}
function sbInsert(table, data) {
  return fetch(SUPABASE_URL + '/rest/v1/' + table, {
    method: 'POST', headers: SB_HEADERS, body: JSON.stringify(data)
  }).then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); });
}
function sbUpsert(table, data) {
  var h = Object.assign({}, SB_HEADERS, {'Prefer':'resolution=merge-duplicates,return=representation'});
  return fetch(SUPABASE_URL + '/rest/v1/' + table, {
    method: 'POST', headers: h, body: JSON.stringify(data)
  }).then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); });
}
function sbDelete(table, query) {
  return fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + query, {
    method: 'DELETE', headers: SB_HEADERS
  }).then(function(r){ if(!r.ok) throw new Error(r.status); });
}
function sbPatch(table, query, data) {
  return fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + query, {
    method: 'PATCH', headers: SB_HEADERS, body: JSON.stringify(data)
  }).then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); });
}

function dateStr(d) {
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n){ return String(n).padStart(2,'0'); }
function today(){ return dateStr(new Date()); }
function logKey(hid, ds){ return hid + '_' + ds; }
function isDone(hid, ds){ return !!logs[logKey(hid,ds)]; }
function catById(id){ return habits.find(function(h){return h.id===id;}) || {name:id,color:'#888580',icon:'?'}; }

function setSync(s){ document.getElementById('syncDot').className = 'sync-dot ' + s; }
function saveCache(){
  localStorage.setItem('ht2_habits', JSON.stringify(habits));
  localStorage.setItem('ht2_logs',   JSON.stringify(logs));
}

function init() {
  setSync('syncing');
  var fromDate = new Date(); fromDate.setDate(fromDate.getDate()-90);
  sbGet('habits','archived=eq.false&order=position.asc')
    .then(function(h){
      habits = h;
      if(habits.length === 0){
        return sbUpsert('habits', [
          {id:'h1',name:'ejercicio',icon:'💪',color:'#3dba8a',frequency:'daily',archived:false,position:0},
          {id:'h2',name:'lectura',icon:'📚',color:'#4a90d9',frequency:'daily',archived:false,position:1},
          {id:'h3',name:'meditación',icon:'🧘',color:'#8b7ed8',frequency:'daily',archived:false,position:2}
        ]).then(function(h2){ habits = h2; });
      }
    })
    .then(function(){
      return sbGet('habit_logs','date=gte.' + dateStr(fromDate) + '&order=date.desc');
    })
    .then(function(rawLogs){
      logs = {};
      rawLogs.forEach(function(l){ if(l.done) logs[logKey(l.habit_id, l.date)] = true; });
      saveCache();
      setSync('ok');
      document.getElementById('loadingOverlay').classList.add('hidden');
      renderAll();
    })
    .catch(function(e){
      setSync('err');
      try {
        var h = localStorage.getItem('ht2_habits');
        var l = localStorage.getItem('ht2_logs');
        if(h) habits = JSON.parse(h);
        if(l) logs   = JSON.parse(l);
      } catch(_){}
      document.getElementById('loadingOverlay').classList.add('hidden');
      renderAll();
    });
}

function renderAll() {
  var now = new Date();
  document.getElementById('headerDate').textContent = DAYS[now.getDay()].slice(0,3) + ' ' + now.getDate();
  renderDayView();
  if(mainView === 'tabs') renderTab();
}

function renderDayView() {
  var ds = dateStr(viewDate);
  document.getElementById('dayName').textContent = DAYS[viewDate.getDay()];
  document.getElementById('dayDate').textContent = viewDate.getDate() + ' ' + MONTHS[viewDate.getMonth()] + ' ' + viewDate.getFullYear();
  renderWeekStrip();
  var total = habits.length;
  var done  = habits.filter(function(h){ return isDone(h.id, ds); }).length;
  var pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressLabel').textContent = done + ' de ' + total + ' completados';
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('progressBar').style.width   = pct + '%';
  var el = document.getElementById('habitsList');
  if(!habits.length){
    el.innerHTML = '<div class="empty-habits">sin hábitos todavía<br><small style="font-size:12px">pulsa + para añadir el primero</small></div>';
    return;
  }
  el.innerHTML = habits.map(function(h){
    var d = isDone(h.id, ds);
    var s = getStreak(h.id);
    var streakHtml = s > 0
      ? '<span class="habit-streak' + (s>=3?' hot':'') + '">' + (s>=3?'🔥':'▸') + ' ' + s + ' día' + (s!==1?'s':'') + '</span>'
      : '<span class="habit-streak">—</span>';
    return '<div class="habit-item' + (d?' done':'') + '" onclick="toggleHabit(\'' + h.id + '\')">'
      + '<div class="habit-check" style="' + (d?'background:'+h.color+';color:#0f0f0f':'') + '">' + (d?'✓':'') + '</div>'
      + '<div class="habit-info"><div class="habit-name">' + h.name + '</div>'
      + '<div style="margin-top:2px">' + streakHtml + '</div></div>'
      + '<div class="habit-icon-emoji">' + h.icon + '</div>'
      + '</div>';
  }).join('');
}

function renderWeekStrip() {
  var ds = dateStr(viewDate);
  var html = '';
  var start = new Date(viewDate);
  start.setDate(start.getDate()-3);
  for(var i=0;i<7;i++){
    var d = new Date(start);
    d.setDate(start.getDate()+i);
    var dds = dateStr(d);
    var isActive = dds === ds;
    var doneCount = habits.filter(function(h){ return isDone(h.id,dds); }).length;
    var pct = habits.length ? doneCount/habits.length : 0;
    var dotColor = pct===1 ? 'var(--green)' : pct>0 ? 'var(--amber)' : 'var(--bg4)';
    html += '<div class="week-day' + (isActive?' active':'') + '" onclick="goToDate(\'' + dds + '\')">'
      + '<span class="wd-name">' + DSHORT[d.getDay()] + '</span>'
      + '<span class="wd-num">' + d.getDate() + '</span>'
      + '<div class="wd-dot" style="background:' + dotColor + '"></div>'
      + '</div>';
  }
  document.getElementById('weekStrip').innerHTML = html;
}

function goToDate(ds){
  viewDate = new Date(ds + 'T12:00:00');
  renderDayView();
}

document.getElementById('prevDay').onclick = function(){
  viewDate.setDate(viewDate.getDate()-1); renderDayView();
};
document.getElementById('nextDay').onclick = function(){
  viewDate.setDate(viewDate.getDate()+1); renderDayView();
};

function toggleHabit(hid) {
  var ds  = dateStr(viewDate);
  var key = logKey(hid, ds);
  var done = !!logs[key];
  setSync('syncing');
  var promise;
  if(done){
    delete logs[key];
    promise = sbDelete('habit_logs','habit_id=eq.' + hid + '&date=eq.' + ds);
  } else {
    logs[key] = true;
    var log = {id:'l'+Date.now()+Math.random().toString(36).slice(2,5), habit_id:hid, date:ds, done:true};
    promise = sbUpsert('habit_logs', log);
  }
  promise.then(function(){ setSync('ok'); saveCache(); })
         .catch(function(){ setSync('err'); });
  renderDayView();
  if(mainView==='tabs') renderTab();
}

function getStreak(hid) {
  var streak = 0;
  var d = new Date();
  if(!isDone(hid, dateStr(d))) d.setDate(d.getDate()-1);
  while(isDone(hid, dateStr(d)) && streak < 366){
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function getBestStreak(hid) {
  var best=0, cur=0;
  var d = new Date(); d.setDate(d.getDate()-90);
  for(var i=0;i<91;i++){
    if(isDone(hid,dateStr(d))){ cur++; if(cur>best) best=cur; } else cur=0;
    d.setDate(d.getDate()+1);
  }
  return best;
}

function getRate(hid, days) {
  var done=0, d=new Date();
  for(var i=0;i<days;i++){ if(isDone(hid,dateStr(d))) done++; d.setDate(d.getDate()-1); }
  return Math.round(done/days*100);
}

function switchView(v) {
  mainView = v;
  document.getElementById('todayView').style.display  = v==='today' ? 'block' : 'none';
  document.getElementById('tabsView').style.display   = v==='tabs'  ? 'flex'  : 'none';
  document.getElementById('fabBtn').classList.toggle('fab-hidden', v!=='today');
  document.getElementById('bnToday').classList.toggle('active', v==='today');
  document.getElementById('bnMore').classList.toggle('active', v==='tabs');
  if(v==='tabs') renderTab();
}

document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click', function(){
    activeTab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active');
    renderTab();
  });
});

function renderTab(){
  if(activeTab==='calendar') renderCalendar();
  else if(activeTab==='stats') renderStats();
  else renderSettings();
}

function renderCalendar() {
  var el = document.getElementById('tabContent');
  var firstDay = new Date(calYear, calMonth, 1);
  var lastDay  = new Date(calYear, calMonth+1, 0);
  var startDow = (firstDay.getDay()+6)%7;
  var todayDs  = today();
  var totalDays = lastDay.getDate();

  var cells = '';
  for(var i=0;i<startDow;i++) cells += '<div class="cal-cell other-month"></div>';

  for(var d=1;d<=totalDays;d++){
    var ds = calYear + '-' + pad(calMonth+1) + '-' + pad(d);
    var isToday = ds===todayDs;
    var doneHabits = habits.filter(function(h){ return isDone(h.id,ds); });
    var allDone = habits.length>0 && doneHabits.length===habits.length;
    var numColor = allDone ? 'var(--green)' : isToday ? 'var(--green)' : 'var(--text2)';
    var fontWeight = allDone ? '600' : '400';
    var ring = isToday ? 'box-shadow:0 0 0 1.5px var(--green);border-radius:6px;' : '';

    var dotsHtml = '';
    if(doneHabits.length > 0){
      dotsHtml = '<div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center;">';
      doneHabits.slice(0,4).forEach(function(h){
        dotsHtml += '<div style="width:5px;height:5px;border-radius:50%;background:' + h.color + '"></div>';
      });
      dotsHtml += '</div>';
    } else {
      dotsHtml = '<div style="height:7px"></div>';
    }

    cells += '<div class="cal-cell" style="' + ring + '" onclick="calClick(\'' + ds + '\')">'
      + '<span style="font-family:var(--mono);font-size:12px;color:' + numColor + ';font-weight:' + fontWeight + '">' + d + '</span>'
      + dotsHtml
      + '</div>';
  }

  var legend = habits.map(function(h){
    return '<div style="display:flex;align-items:center;gap:5px">'
      + '<div style="width:8px;height:8px;border-radius:50%;background:' + h.color + '"></div>'
      + '<span style="font-size:11px;color:var(--text2)">' + h.icon + ' ' + h.name + '</span>'
      + '</div>';
  }).join('');

  var summaryRows = habits.map(function(h){
    var count=0;
    for(var d=1;d<=totalDays;d++){
      if(isDone(h.id, calYear+'-'+pad(calMonth+1)+'-'+pad(d))) count++;
    }
    var pct = Math.round(count/totalDays*100);
    return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">'
      + '<span style="font-size:16px">' + h.icon + '</span>'
      + '<div style="flex:1">'
      + '<div style="font-size:13px;font-weight:500;color:var(--text)">' + h.name + '</div>'
      + '<div style="height:3px;background:var(--bg4);border-radius:2px;margin-top:4px">'
      + '<div style="height:3px;background:' + h.color + ';border-radius:2px;width:' + pct + '%"></div>'
      + '</div></div>'
      + '<div style="text-align:right;flex-shrink:0">'
      + '<div style="font-family:var(--mono);font-size:13px;color:var(--text)">' + count + 'd</div>'
      + '<div style="font-family:var(--mono);font-size:10px;color:var(--text3)">' + pct + '%</div>'
      + '</div></div>';
  }).join('') || '<div style="color:var(--text3);font-size:13px;padding:12px 0;text-align:center">sin hábitos</div>';

  var dowHeaders = ['L','M','X','J','V','S','D'].map(function(d){
    return '<div class="cal-dow">' + d + '</div>';
  }).join('');

  el.innerHTML = '<div class="cal-header">'
    + '<button class="nav-btn" onclick="calPrev()">&#8249;</button>'
    + '<div class="cal-month-label">' + MONTHS[calMonth] + ' ' + calYear + '</div>'
    + '<button class="nav-btn" onclick="calNext()">&#8250;</button>'
    + '</div>'
    + '<div class="cal-grid-header">' + dowHeaders + '</div>'
    + '<div class="cal-grid">' + cells + '</div>'
    + '<div style="padding:8px 20px 4px;display:flex;flex-wrap:wrap;gap:6px 14px">' + legend + '</div>'
    + '<div style="padding:4px 20px 20px">'
    + '<div style="font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:10px 0 6px">resumen del mes</div>'
    + summaryRows
    + '</div>';
}

function calClick(ds){
  viewDate = new Date(ds + 'T12:00:00');
  switchView('today');
}
function calPrev(){ if(calMonth===0){calMonth=11;calYear--;}else calMonth--; renderCalendar(); }
function calNext(){ if(calMonth===11){calMonth=0;calYear++;}else calMonth++; renderCalendar(); }

function renderStats() {
  var el = document.getElementById('tabContent');
  var bestStreak = 0, curStreak = 0, totalDone30 = 0, totalPossible30 = habits.length*30;
  habits.forEach(function(h){
    var b = getBestStreak(h.id), c = getStreak(h.id);
    if(b>bestStreak) bestStreak=b;
    if(c>curStreak)  curStreak=c;
    var d=new Date();
    for(var i=0;i<30;i++){ if(isDone(h.id,dateStr(d))) totalDone30++; d.setDate(d.getDate()-1); }
  });
  var rate30 = totalPossible30 ? Math.round(totalDone30/totalPossible30*100) : 0;

  // Heatmap: 70 days (10 cols x 7 rows)
  var heatCells = '';
  var heatStart = new Date(); heatStart.setDate(heatStart.getDate()-69);
  var dow = (heatStart.getDay()+6)%7;
  for(var i=0;i<dow;i++) heatCells += '<div class="act-cell"></div>';
  for(var i=0;i<70;i++){
    var d = new Date(heatStart); d.setDate(heatStart.getDate()+i);
    var ds = dateStr(d);
    var done = habits.filter(function(h){ return isDone(h.id,ds); }).length;
    var pct = habits.length ? done/habits.length : 0;
    var bg = pct===0 ? 'var(--bg3)' : pct<0.5 ? 'rgba(61,186,138,0.25)' : pct<1 ? 'rgba(61,186,138,0.6)' : '#3dba8a';
    heatCells += '<div class="act-cell" style="background:' + bg + '" title="' + ds + ': ' + done + '/' + habits.length + '"></div>';
  }

  var habitRows = habits.map(function(h){
    var rate = getRate(h.id,30);
    var streak = getStreak(h.id);
    var best   = getBestStreak(h.id);
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'
      + '<span style="font-size:18px">' + h.icon + '</span>'
      + '<div style="flex:1">'
      + '<div style="font-size:13px;font-weight:500;color:var(--text)">' + h.name + '</div>'
      + '<div style="height:3px;background:var(--bg4);border-radius:2px;margin-top:5px">'
      + '<div style="height:3px;background:' + h.color + ';border-radius:2px;width:' + rate + '%"></div></div></div>'
      + '<div style="text-align:right;flex-shrink:0">'
      + '<div style="font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)">' + rate + '%</div>'
      + '<div style="font-family:var(--mono);font-size:10px;color:var(--text3)">' + (streak>=3?'🔥':'▸') + ' ' + streak + 'd · best ' + best + 'd</div>'
      + '</div></div>';
  }).join('') || '<div style="color:var(--text3);font-size:13px;text-align:center;padding:16px 0">sin hábitos</div>';

  el.innerHTML = '<div class="stats-content">'
    + '<div class="stat-card"><div class="stat-card-title">resumen global</div>'
    + '<div class="stat-grid">'
    + '<div><div class="stat-num" style="color:' + (curStreak>=3?'var(--amber)':'var(--text)') + '">' + curStreak + (curStreak>=3?'🔥':'') + '</div><div class="stat-num-label">racha actual</div></div>'
    + '<div><div class="stat-num">' + bestStreak + '</div><div class="stat-num-label">mejor racha</div></div>'
    + '<div><div class="stat-num">' + rate30 + '%</div><div class="stat-num-label">tasa 30d</div></div>'
    + '</div></div>'
    + '<div class="stat-card"><div class="stat-card-title">actividad — últimas 10 semanas</div>'
    + '<div class="activity-grid">' + heatCells + '</div>'
    + '<div style="display:flex;align-items:center;gap:6px;margin-top:8px;justify-content:flex-end">'
    + '<span style="font-size:10px;color:var(--text3)">menos</span>'
    + ['var(--bg3)','rgba(61,186,138,0.25)','rgba(61,186,138,0.6)','#3dba8a'].map(function(c){ return '<div style="width:10px;height:10px;border-radius:2px;background:' + c + '"></div>'; }).join('')
    + '<span style="font-size:10px;color:var(--text3)">más</span></div></div>'
    + '<div class="stat-card"><div class="stat-card-title">por hábito — últimos 30 días</div>' + habitRows + '</div>'
    + '</div>';
}

function renderSettings() {
  var habitRows = habits.map(function(h){
    return '<div class="hmr">'
      + '<span style="font-size:16px">' + h.icon + '</span>'
      + '<span style="font-size:13px;color:' + h.color + ';flex:1">' + h.name + '</span>'
      + '<button class="hmr-del" onclick="deleteHabit(\'' + h.id + '\')">&#x2715;</button>'
      + '</div>';
  }).join('') || '<div style="color:var(--text3);font-size:13px;padding:8px 0">sin hábitos</div>';

  document.getElementById('tabContent').innerHTML = '<div class="settings-content">'
    + '<div class="settings-section"><div class="settings-title">sincronización</div>'
    + '<div class="settings-info">' + habits.length + ' hábitos · conectado a Supabase</div>'
    + '<button class="settings-btn" onclick="forceSync()">&#8635; sincronizar ahora</button>'
    + '<div class="status-msg" id="syncMsg"></div></div>'
    + '<div class="settings-section"><div class="settings-title">mis hábitos</div>' + habitRows + '</div>'
    + '<div class="settings-section"><div class="settings-title">sesión</div>'
    + '<button class="settings-btn danger" onclick="lockApp()">&#128274; bloquear app</button></div>'
    + '<div class="settings-section"><div class="settings-title">zona de peligro</div>'
    + '<button class="settings-btn danger" onclick="clearLogs()">&#9888; borrar todos los registros</button></div>'
    + '<div style="text-align:center;padding:20px 0;font-size:11px;font-family:var(--mono);color:var(--text3)">habittrack · supabase sync</div>'
    + '</div>';
}

function deleteHabit(id) {
  if(!confirm('¿Eliminar este hábito y todos sus registros?')) return;
  setSync('syncing');
  sbDelete('habits','id=eq.' + id)
    .then(function(){
      habits = habits.filter(function(h){ return h.id!==id; });
      Object.keys(logs).forEach(function(k){ if(k.indexOf(id+'_')===0) delete logs[k]; });
      saveCache(); setSync('ok'); renderAll();
    }).catch(function(e){ setSync('err'); alert('Error: ' + e.message); });
}

function forceSync() {
  var msg = document.getElementById('syncMsg');
  if(msg){ msg.textContent='sincronizando...'; msg.className='status-msg'; }
  setSync('syncing');
  var fromDate = new Date(); fromDate.setDate(fromDate.getDate()-90);
  sbGet('habits','archived=eq.false&order=position.asc')
    .then(function(h){ habits=h; return sbGet('habit_logs','date=gte.'+dateStr(fromDate)+'&order=date.desc'); })
    .then(function(rl){ logs={}; rl.forEach(function(l){ if(l.done) logs[logKey(l.habit_id,l.date)]=true; }); saveCache(); setSync('ok'); if(msg){msg.textContent='✓ sincronizado';msg.className='status-msg status-ok';} renderAll(); })
    .catch(function(e){ setSync('err'); if(msg){msg.textContent='✗ error';msg.className='status-msg status-err';} });
}

function clearLogs() {
  if(!confirm('¿Borrar TODOS los registros?')) return;
  setSync('syncing');
  sbDelete('habit_logs','id=neq.NOOP')
    .then(function(){ logs={}; saveCache(); setSync('ok'); renderAll(); })
    .catch(function(e){ setSync('err'); alert('Error'); });
}

function lockApp() { localStorage.removeItem('ht2_pin_ok'); location.reload(); }

// Modal
var fabBtn  = document.getElementById('fabBtn');
var modalBg = document.getElementById('modalBg');
fabBtn.onclick = openModal;
modalBg.addEventListener('click', function(e){ if(e.target===modalBg) closeModal(); });

function openModal() {
  selIcon=ICONS[0]; selColor=COLORS[0];
  document.getElementById('habitName').value='';
  document.getElementById('modalStatus').textContent='';
  document.getElementById('iconGrid').innerHTML = ICONS.map(function(ic){
    return '<div class="icon-btn' + (ic===selIcon?' sel':'') + '" onclick="pickIcon(\'' + ic + '\')">' + ic + '</div>';
  }).join('');
  document.getElementById('colorGrid').innerHTML = COLORS.map(function(c){
    return '<div class="color-dot' + (c===selColor?' sel':'') + '" style="background:' + c + '" onclick="pickColor(\'' + c + '\')"></div>';
  }).join('');
  modalBg.classList.add('visible');
  fabBtn.classList.add('open');
  setTimeout(function(){ document.getElementById('habitName').focus(); }, 300);
}
function closeModal(){ modalBg.classList.remove('visible'); fabBtn.classList.remove('open'); }
function pickIcon(ic){
  selIcon=ic;
  document.querySelectorAll('.icon-btn').forEach(function(b){ b.classList.toggle('sel', b.textContent===ic); });
}
function pickColor(c){
  selColor=c;
  document.querySelectorAll('.color-dot').forEach(function(b){ b.classList.toggle('sel', b.style.backgroundColor===hexToRgb(c)||b.style.background===c); });
}
function hexToRgb(hex){ var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return 'rgb('+r+', '+g+', '+b+')'; }

function saveHabit() {
  var name = document.getElementById('habitName').value.trim();
  var status = document.getElementById('modalStatus');
  if(!name){ status.textContent='escribe un nombre'; status.className='modal-status status-err'; return; }
  status.textContent='guardando...'; status.className='modal-status';
  setSync('syncing');
  var habit = {id:'h'+Date.now()+Math.random().toString(36).slice(2,5), name:name, icon:selIcon, color:selColor, frequency:'daily', archived:false, position:habits.length};
  sbInsert('habits', habit)
    .then(function(){ habits.push(habit); saveCache(); setSync('ok'); status.textContent='✓ guardado'; status.className='modal-status status-ok'; renderAll(); setTimeout(closeModal,500); })
    .catch(function(e){ setSync('err'); status.textContent='error: '+e.message; status.className='modal-status status-err'; });
}

// PIN
function checkPin() {
  var v = document.getElementById('pinInput').value;
  if(v===PIN){
    localStorage.setItem('ht2_pin_ok','1');
    document.getElementById('pinScreen').style.display='none';
    document.getElementById('loadingOverlay').classList.remove('hidden');
    init();
  } else {
    var e=document.getElementById('pinErr');
    e.textContent='PIN incorrecto';
    document.getElementById('pinInput').value='';
    document.getElementById('pinInput').focus();
    setTimeout(function(){ e.textContent=''; }, 2000);
  }
}
document.getElementById('pinInput').addEventListener('keydown', function(e){ if(e.key==='Enter') checkPin(); });

// Boot
if(localStorage.getItem('ht2_pin_ok')==='1'){
  init();
} else {
  document.getElementById('loadingOverlay').classList.add('hidden');
  document.getElementById('pinScreen').style.display='flex';
  setTimeout(function(){ document.getElementById('pinInput').focus(); }, 300);
}
